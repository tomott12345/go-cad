name: GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

defaults:
  run:
    working-directory: go-cad

jobs:
  deploy:
    name: Build and deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Compile WASM
        env:
          GOOS: js
          GOARCH: wasm
        run: go build -buildvcs=false -o web/main.wasm ./cmd/wasm/

      - name: Copy wasm_exec.js runtime shim
        run: |
          GOROOT=$(go env GOROOT)
          # Go 1.24+ moved wasm_exec.js from misc/wasm/ to lib/wasm/
          if [ -f "$GOROOT/lib/wasm/wasm_exec.js" ]; then
            cp "$GOROOT/lib/wasm/wasm_exec.js" web/wasm_exec.js
          else
            cp "$GOROOT/misc/wasm/wasm_exec.js" web/wasm_exec.js
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: go-cad/web
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy go-cad web app (${{ github.sha }})"
