name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

defaults:
  run:
    working-directory: go-cad

jobs:
  build-release:
    name: Build release binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          go build \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o dist/go-cad-${{ matrix.os }}-${{ matrix.arch }}${ext} \
            ./cmd/cad/
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-cad-${{ matrix.os }}-${{ matrix.arch }}
          path: go-cad/dist/

  build-wasm:
    name: Build WASM web app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Compile WASM
        env:
          GOOS: js
          GOARCH: wasm
        run: go build -buildvcs=false -o web/main.wasm ./cmd/wasm/
      - name: Package web app
        run: |
          mkdir -p dist
          cd web && zip -r ../dist/go-cad-web.zip . -x "*.DS_Store"
      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-cad-web
          path: go-cad/dist/go-cad-web.zip

  publish-release:
    name: Publish GitHub Release
    needs: [build-release, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: go-cad ${{ github.ref_name }}
          body: |
            ## go-cad ${{ github.ref_name }}

            ### Downloads
            | Platform | Architecture | Binary |
            |----------|-------------|--------|
            | Linux    | amd64       | `go-cad-linux-amd64` |
            | Linux    | arm64       | `go-cad-linux-arm64` |
            | macOS    | amd64       | `go-cad-darwin-amd64` |
            | macOS    | arm64 (M-series) | `go-cad-darwin-arm64` |
            | Windows  | amd64       | `go-cad-windows-amd64.exe` |
            | Web/WASM | —           | `go-cad-web.zip` |

            ### Try it in the browser
            Visit [go-cad on GitHub Pages](https://tomott12345.github.io/go-cad) for a live demo.

            See [CHANGELOG.md](CHANGELOG.md) for what changed in this release.
          files: artifacts/**/*
          generate_release_notes: true
