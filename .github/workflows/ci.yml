name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: go-cad

jobs:
  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: go-cad

  # ── Test ───────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: go-cad/coverage.out
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Generate coverage summary
        if: github.event_name == 'pull_request'
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}')
          {
            echo "## Test Coverage 📊"
            echo ""
            echo "**Total: \`${TOTAL}\`**"
            echo ""
            echo "<details>"
            echo "<summary>Per-package breakdown</summary>"
            echo ""
            echo "| Package | Coverage |"
            echo "|---------|----------|"
            go tool cover -func=coverage.out | awk '
              !/^total:/ {
                split($1, a, ":")
                file = a[1]
                sub(/\/[^\/]*$/, "", file)
                pct = $NF
                gsub(/%/, "", pct)
                if (pct+0 >= 0) { count[file]++; sum[file] += pct+0 }
              }
              END {
                for (pkg in sum)
                  printf "| `%s` | %.1f%% |\n", pkg, sum[pkg]/count[pkg]
              }
            ' | sort
            echo ""
            echo "</details>"
          } > /tmp/coverage-comment.md
      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: go-coverage
          path: /tmp/coverage-comment.md

  # ── Module-wide build check ────────────────────────────────────────────────
  build-check:
    name: Build (module)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Verify all packages compile
        run: go build ./...

  # ── Cross-compile ──────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Cross-compile desktop binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          go build -ldflags="-s -w" -o ../dist/go-cad-${{ matrix.os }}-${{ matrix.arch }}${ext} ./cmd/cad/

  # ── WASM ──────────────────────────────────────────────────────────────────
  wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Compile WASM
        env:
          GOOS: js
          GOARCH: wasm
        run: go build -buildvcs=false -o web/main.wasm ./cmd/wasm/

  # ── E2E browser tests ──────────────────────────────────────────────────────
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Compile WASM for frontend
        env:
          GOOS: js
          GOARCH: wasm
        run: go build -buildvcs=false -o web/main.wasm ./cmd/wasm/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: go-cad/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev server and run E2E tests
        run: npx playwright test --reporter=github
        env:
          PORT: 8080
