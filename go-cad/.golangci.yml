version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - revive
    - gofmt
    - misspell
    - gosimple
    - ineffassign

linters-settings:
  errcheck:
    check-blank: false
    check-type-assertions: false
  revive:
    rules:
      - name: exported
        arguments:
          - checkPrivateReceivers
          - sayRepetitiveInsteadOfStutters
      - name: var-naming
      - name: package-comments
  govet:
    enable:
      - shadow
  misspell:
    locale: US

issues:
  exclude-rules:
    # Test files may use unexported types freely
    - path: "_test\\.go"
      linters:
        - errcheck
        - revive
    # WASM entrypoint uses js.Value and js.Func which trigger false positives
    - path: "cmd/wasm/main\\.go"
      linters:
        - errcheck
    # cmd/cad terminal REPL: fmt.Println return values intentionally ignored
    - path: "cmd/cad/main\\.go"
      linters:
        - errcheck

  max-issues-per-linter: 50
  max-same-issues: 5

run:
  timeout: 5m
  build-tags:
    - ignore_autogenerated
