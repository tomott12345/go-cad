<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>go-cad</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{display:flex;flex-direction:column;height:100vh;background:#1e1e1e;color:#ccc;font:13px/1.4 'Segoe UI',system-ui,sans-serif;overflow:hidden}

#toolbar{display:flex;align-items:center;gap:4px;padding:6px 8px;background:#2d2d2d;border-bottom:1px solid #444;flex-shrink:0;flex-wrap:wrap}
#toolbar button{padding:4px 10px;border:1px solid #555;border-radius:4px;background:#3a3a3a;color:#ccc;cursor:pointer;font-size:12px;white-space:nowrap}
#toolbar button:hover{background:#505050}
#toolbar button.active{background:#0078d4;border-color:#0060a8;color:#fff}
#toolbar button.snap-on{background:#005f1f;border-color:#007a28;color:#6effa0}
#toolbar .sep{width:1px;height:24px;background:#555;margin:0 4px;flex-shrink:0}
#layer-sel,#export-fmt{background:#3a3a3a;border:1px solid #555;border-radius:4px;color:#ccc;font-size:12px;padding:3px 6px}
#color-inp{width:36px;height:26px;border:1px solid #555;border-radius:4px;padding:2px;cursor:pointer;background:transparent}

/* ── Layer Manager Modal ─────────────────────────────────────────────────── */
#layer-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:center;justify-content:center}
#layer-modal.open{display:flex}
#layer-panel{background:#252525;border:1px solid #555;border-radius:6px;width:620px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.6)}
#layer-panel h3{padding:10px 14px;margin:0;font-size:13px;border-bottom:1px solid #444;color:#ddd;display:flex;justify-content:space-between;align-items:center}
#layer-panel h3 button{padding:2px 8px;font-size:11px;border:1px solid #555;border-radius:3px;background:#3a3a3a;color:#ccc;cursor:pointer}
#layer-table-wrap{overflow-y:auto;flex:1}
#layer-table{width:100%;border-collapse:collapse;font-size:12px}
#layer-table th{padding:5px 8px;background:#2d2d2d;border-bottom:1px solid #444;text-align:left;color:#aaa;font-weight:600;white-space:nowrap;position:sticky;top:0}
#layer-table td{padding:4px 8px;border-bottom:1px solid #333;vertical-align:middle}
#layer-table tr:hover td{background:#2a2a2a}
#layer-table input[type=text]{background:#1a1a1a;border:1px solid #444;border-radius:3px;color:#ccc;font-size:12px;padding:2px 5px;width:100%}
#layer-table input[type=color]{width:28px;height:22px;border:1px solid #444;border-radius:3px;padding:1px;cursor:pointer;background:transparent}
.layer-check{cursor:pointer;accent-color:#0078d4}
.layer-btn{padding:2px 7px;font-size:11px;border:1px solid #555;border-radius:3px;background:#3a3a3a;color:#ccc;cursor:pointer;white-space:nowrap}
.layer-btn:hover{background:#505050}
.layer-del{color:#c0392b;border-color:#7b241c}
.layer-del:hover{background:#7b241c}
#layer-panel-footer{display:flex;gap:8px;padding:8px 12px;border-top:1px solid #444;justify-content:flex-end}
#layer-panel-footer button{padding:4px 14px;border:1px solid #555;border-radius:4px;background:#3a3a3a;color:#ccc;cursor:pointer;font-size:12px}
#layer-panel-footer button:hover{background:#505050}
#layer-panel-footer button.primary{background:#0078d4;border-color:#0060a8;color:#fff}

/* ── Snap Settings popover ───────────────────────────────────────────────── */
#snap-settings{display:none;position:absolute;top:44px;left:0;background:#252525;border:1px solid #555;
  border-radius:5px;padding:10px 14px;z-index:200;min-width:180px;box-shadow:0 6px 20px rgba(0,0,0,.6)}
#snap-settings.open{display:block}
#snap-settings h4{font-size:11px;color:#888;margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px}
.snap-row{display:flex;align-items:center;gap:7px;padding:3px 0;cursor:pointer;font-size:12px;color:#ccc}
.snap-row input{accent-color:#0078d4;cursor:pointer}
.snap-swatch{width:10px;height:10px;border-radius:1px;flex-shrink:0}
#snap-settings-footer{display:flex;gap:6px;margin-top:8px;padding-top:7px;border-top:1px solid #333}
#snap-settings-footer button{flex:1;padding:3px 0;font-size:11px;border:1px solid #555;border-radius:3px;
  background:#3a3a3a;color:#ccc;cursor:pointer}
#snap-settings-footer button:hover{background:#505050}

/* ── Snap marker overlay ─────────────────────────────────────────────────── */
#snap-marker{position:absolute;pointer-events:none;display:none}
#snap-marker svg{overflow:visible}

#viewport{flex:1;position:relative;overflow:hidden}
#canvas{display:block;cursor:crosshair}

#cmdbar{display:flex;align-items:center;gap:8px;padding:4px 8px;background:#252525;border-top:1px solid #444;flex-shrink:0;min-height:30px}
#status{flex:1;color:#888;font-size:12px}
#cmd-input{flex:0 0 320px;background:#1a1a1a;border:1px solid #555;border-radius:4px;color:#ccc;font-size:12px;padding:4px 8px;outline:none}
#cmd-input:focus{border-color:#0078d4}
#coords{color:#666;font-size:11px;min-width:160px;text-align:right}
</style>
</head>
<body>
<!-- ── Toolbar ─────────────────────────────────────────────────────────────── -->
<div id="toolbar">
  <!-- Primitives -->
  <button id="tool-line"    class="active" title="Line (L)">Line</button>
  <button id="tool-circle"  title="Circle (C)">Circle</button>
  <button id="tool-arc"     title="Arc (A)">Arc</button>
  <button id="tool-rect"    title="Rectangle (R)">Rect</button>
  <button id="tool-poly"    title="Polyline (P)">Polyline</button>

  <div class="sep"></div>

  <!-- Advanced splines (Task #3) -->
  <button id="tool-spline"  title="Cubic Bezier Spline (S) — click ≥4 pts, Enter to finish">Spline</button>
  <button id="tool-nurbs"   title="NURBS B-Spline (N) — click ≥4 pts, Enter to finish">NURBS</button>

  <div class="sep"></div>

  <!-- Shape / text (Task #3) -->
  <button id="tool-ellipse" title="Ellipse (E) — centre, semi-major tip, semi-minor tip">Ellipse</button>
  <button id="tool-text"    title="Single-line Text (T)">Text</button>
  <button id="tool-mtext"   title="Multi-line Text (MT) — type \\n for line breaks">MText</button>

  <div class="sep"></div>

  <!-- Dimensions (Task #3) -->
  <button id="tool-dimlin"  title="Linear Dimension">DimLin</button>
  <button id="tool-dimali"  title="Aligned Dimension">DimAli</button>
  <button id="tool-dimang"  title="Angular Dimension">DimAng</button>
  <button id="tool-dimrad"  title="Radial Dimension">DimRad</button>
  <button id="tool-dimdia"  title="Diameter Dimension">DimDia</button>

  <div class="sep"></div>

  <!-- Edit operations (Task #4) -->
  <button id="tool-move"       title="Move (M) — select entity, type: MOVE dx dy">Move</button>
  <button id="tool-copy"       title="Copy (CP) — select entity, type: COPY dx dy">Copy</button>
  <button id="tool-rotate"     title="Rotate (RO) — select entity, type: ROTATE angle [cx cy]">Rotate</button>
  <button id="tool-scale"      title="Scale (SC) — select entity, type: SCALE factor [cx cy]">Scale</button>
  <button id="tool-mirror"     title="Mirror (MI) — click two pts on mirror axis">Mirror</button>
  <button id="tool-trim"       title="Trim (TR) — click cutter, then part to remove">Trim</button>
  <button id="tool-extend"     title="Extend (EX) — click boundary, then end to extend">Extend</button>
  <button id="tool-fillet"     title="Fillet (F) — select two lines, type: FILLET radius">Fillet</button>
  <button id="tool-chamfer"    title="Chamfer (CHA) — select two lines, type: CHAMFER d1 d2">Chamfer</button>
  <button id="tool-arrayrect"  title="Rect Array (AR) — select entity, type: ARRAYRECT rows cols dy dx">ArrayRect</button>
  <button id="tool-arraypolar" title="Polar Array (AP) — select entity, type: ARRAYPOLAR count angle [cx cy]">ArrayPolar</button>
  <button id="tool-offset"     title="Offset (O) — select entity, type: OFFSET dist  (e.g. OFFSET 5 or OFFSET -3)">Offset</button>

  <div class="sep"></div>

  <!-- Ops -->
  <button id="btn-undo"    title="Undo (Ctrl+Z)">Undo</button>
  <button id="btn-redo"    title="Redo (Ctrl+Y)">Redo</button>
  <button id="btn-del"     title="Delete selected (Del)">Delete</button>
  <button id="btn-clear"   title="Clear all">Clear</button>
  <button id="btn-zoomfit" title="Zoom to fit (ZF)">Fit</button>
  <button id="btn-export"  title="Export DXF">Export</button>

  <div class="sep"></div>

  <!-- Snap (Task #5) — toggle + settings popover -->
  <div style="position:relative">
    <button id="btn-snap" class="snap-on" title="Object Snap toggle (F3)">Snap ✓</button>
    <button id="btn-snap-settings" title="Snap settings"
      style="padding:4px 6px;border:1px solid #555;border-radius:4px;background:#3a3a3a;color:#ccc;cursor:pointer;font-size:11px">⚙</button>
    <div id="snap-settings">
      <h4>Object Snap Modes</h4>
      <label class="snap-row"><input type="checkbox" id="snp-endpoint"      checked><span class="snap-swatch" style="background:#ff4444"></span>Endpoint</label>
      <label class="snap-row"><input type="checkbox" id="snp-midpoint"      checked><span class="snap-swatch" style="background:#44ff44"></span>Midpoint</label>
      <label class="snap-row"><input type="checkbox" id="snp-center"        checked><span class="snap-swatch" style="background:#4488ff"></span>Center</label>
      <label class="snap-row"><input type="checkbox" id="snp-quadrant"      checked><span class="snap-swatch" style="background:#ffaa00"></span>Quadrant</label>
      <label class="snap-row"><input type="checkbox" id="snp-intersection"  checked><span class="snap-swatch" style="background:#ff44ff"></span>Intersection</label>
      <label class="snap-row"><input type="checkbox" id="snp-perpendicular" checked><span class="snap-swatch" style="background:#00ffff"></span>Perpendicular</label>
      <label class="snap-row"><input type="checkbox" id="snp-tangent"       checked><span class="snap-swatch" style="background:#ffff44"></span>Tangent</label>
      <label class="snap-row"><input type="checkbox" id="snp-nearest"       checked><span class="snap-swatch" style="background:#aaaaaa"></span>Nearest</label>
      <div id="snap-settings-footer">
        <button onclick="setAllSnapModes(true)">All</button>
        <button onclick="setAllSnapModes(false)">None</button>
        <button onclick="closeSnapSettings()">Close</button>
      </div>
    </div>
  </div>

  <div class="sep"></div>

  <!-- Layer controls (Task #5) -->
  <label style="color:#888;font-size:11px">Layer</label>
  <select id="layer-sel" title="Current drawing layer"></select>
  <button id="btn-layers" title="Layer Manager…">Layers…</button>
  <input type="color" id="color-inp" value="#00ff00" title="Entity colour">
  <select id="export-fmt" title="DXF export format">
    <option value="r2000">R2000</option>
    <option value="r12">R12</option>
  </select>
</div>

<!-- ── Layer Manager Modal (Task #5) ─────────────────────────────────────── -->
<div id="layer-modal">
  <div id="layer-panel">
    <h3>Layer Manager
      <button id="btn-add-layer">+ New Layer</button>
    </h3>
    <div id="layer-table-wrap">
      <table id="layer-table">
        <thead>
          <tr>
            <th>Cur</th><th>Name</th><th>Color</th><th>Line Type</th>
            <th title="Line weight mm">LW</th>
            <th title="Visible">Vis</th><th title="Locked">Lck</th>
            <th title="Frozen">Frz</th><th title="Print">Prt</th><th></th>
          </tr>
        </thead>
        <tbody id="layer-tbody"></tbody>
      </table>
    </div>
    <div id="layer-panel-footer">
      <button id="btn-close-layers">Close</button>
    </div>
  </div>
</div>

<!-- ── Snap marker SVG overlay (Task #5) ─────────────────────────────────── -->
<div id="snap-marker">
  <svg width="20" height="20" viewBox="-10 -10 20 20" id="snap-svg"></svg>
</div>

<!-- ── Drawing canvas ─────────────────────────────────────────────────────── -->
<div id="viewport">
  <canvas id="canvas"></canvas>
</div>

<!-- ── Status / command bar ───────────────────────────────────────────────── -->
<div id="cmdbar">
  <div id="status">Initialising…</div>
  <input id="cmd-input" placeholder="Command  (LINE, NURBS, DIMRAD, UNDO, ZF, DXF, …)" autocomplete="off" spellcheck="false">
  <div id="coords">0.00, 0.00</div>
</div>

<script>
// ─── WASM loader ──────────────────────────────────────────────────────────────
let wasmReady = false;

async function loadWASM() {
  const go = new Go();
  const res = await WebAssembly.instantiateStreaming(fetch('main.wasm'), go.importObject);
  go.run(res.instance);
  wasmReady = true;
  setStatus('Ready — select a tool and click to draw');
}

function installDemoStubs() {
  // Minimal in-browser stubs so the UI works without a compiled WASM binary.
  let nextId = 1;
  const ents = [];
  const mk = (obj) => { ents.push({ id: nextId++, ...obj }); return nextId - 1; };
  window.cadAddLine        = (x1,y1,x2,y2,l,c)               => mk({type:'line',x1,y1,x2,y2,layer:l,color:c});
  window.cadAddCircle      = (cx,cy,r,l,c)                    => mk({type:'circle',cx,cy,r,layer:l,color:c});
  window.cadAddArc         = (cx,cy,r,s,e,l,c)                => mk({type:'arc',cx,cy,r,startDeg:s,endDeg:e,layer:l,color:c});
  window.cadAddRectangle   = (x1,y1,x2,y2,l,c)               => mk({type:'rectangle',x1,y1,x2,y2,layer:l,color:c});
  window.cadAddPolyline    = (pts,l,c)                        => mk({type:'polyline',points:pts,layer:l,color:c});
  window.cadAddSpline      = (pts,l,c)                        => mk({type:'spline',points:pts,layer:l,color:c});
  window.cadAddNURBS       = (deg,pts,kn,wt,l,c)              => mk({type:'nurbs',nurbsDeg:deg,points:pts,knots:kn,weights:wt,layer:l,color:c});
  window.cadAddEllipse     = (cx,cy,a,b,rot,l,c)              => mk({type:'ellipse',cx,cy,r:a,r2:b,rotDeg:rot,layer:l,color:c});
  window.cadAddText        = (x,y,t,h,rot,fn,l,c)             => mk({type:'text',x1:x,y1:y,text:t,textHeight:h,rotDeg:rot,font:fn,layer:l,color:c});
  window.cadAddMText       = (x,y,t,h,w,rot,fn,l,c)           => mk({type:'mtext',x1:x,y1:y,text:t,textHeight:h,r2:w,rotDeg:rot,font:fn,layer:l,color:c});
  window.cadAddLinearDim   = (x1,y1,x2,y2,off,l,c)           => mk({type:'dimlin',x1,y1,x2,y2,cx:off,layer:l,color:c});
  window.cadAddAlignedDim  = (x1,y1,x2,y2,off,l,c)           => mk({type:'dimali',x1,y1,x2,y2,cx:off,layer:l,color:c});
  window.cadAddAngularDim  = (cx,cy,x1,y1,x2,y2,r,l,c)       => mk({type:'dimang',cx,cy,x1,y1,x2,y2,r,layer:l,color:c});
  window.cadAddRadialDim   = (cx,cy,r,ang,l,c)                => mk({type:'dimrad',cx,cy,r,rotDeg:ang,layer:l,color:c});
  window.cadAddDiameterDim = (cx,cy,r,ang,l,c)                => mk({type:'dimdia',cx,cy,r,rotDeg:ang,layer:l,color:c});
  window.cadDeleteEntity   = id => { const i=ents.findIndex(e=>e.id===id); if(i>=0){ents.splice(i,1);return true;} return false; };
  window.cadUndo           = () => { if(ents.length>0){ents.pop();return true;} return false; };
  window.cadRedo           = () => false;
  window.cadClear          = () => { ents.length=0; };
  window.cadEntities       = () => JSON.stringify(ents);
  window.cadExportDXF      = () => '  0\nSECTION\n  2\nENTITIES\n  0\nENDSEC\n  0\nEOF\n';
  window.cadExportDXFR12   = () => window.cadExportDXF();
  window.cadNearestEntity  = (x,y,r) => { let best=0,bestD=r||Infinity; ents.forEach(e=>{const d=Math.hypot((e.cx||e.x1||0)-x,(e.cy||e.y1||0)-y);if(d<bestD){bestD=d;best=e.id;}}); return best; };
  // ── Edit op stubs (demo mode) ────────────────────────────────────────────────
  window.cadMove        = (ids,dx,dy) => { ids.forEach(id=>{const e=ents.find(e=>e.id===id);if(!e)return;if(e.x1!=null){e.x1+=dx;e.y1+=dy;}if(e.x2!=null){e.x2+=dx;e.y2+=dy;}if(e.cx!=null){e.cx+=dx;e.cy+=dy;}if(e.points)e.points=e.points.map(p=>[p[0]+dx,p[1]+dy]);}); return true; };
  window.cadCopy        = (ids,dx,dy) => ids.map(id=>{const e=ents.find(e=>e.id===id);if(!e)return -1;const ne=JSON.parse(JSON.stringify(e));ne.id=nextId++;if(ne.x1!=null){ne.x1+=dx;ne.y1+=dy;}if(ne.x2!=null){ne.x2+=dx;ne.y2+=dy;}if(ne.cx!=null){ne.cx+=dx;ne.cy+=dy;}if(ne.points)ne.points=ne.points.map(p=>[p[0]+dx,p[1]+dy]);ents.push(ne);return ne.id;});
  window.cadRotate      = (ids,cx,cy,ang,mc) => { const r=ang*Math.PI/180,cs=Math.cos(r),sn=Math.sin(r); const rot=(x,y)=>[cx+(x-cx)*cs-(y-cy)*sn,cy+(x-cx)*sn+(y-cy)*cs]; if(mc){return ids.map(id=>{const e=ents.find(e=>e.id===id);if(!e)return -1;const ne=JSON.parse(JSON.stringify(e));ne.id=nextId++;if(ne.x1!=null){[ne.x1,ne.y1]=rot(ne.x1,ne.y1);}if(ne.x2!=null){[ne.x2,ne.y2]=rot(ne.x2,ne.y2);}if(ne.cx!=null){[ne.cx,ne.cy]=rot(ne.cx,ne.cy);}ents.push(ne);return ne.id;});}else{ids.forEach(id=>{const e=ents.find(e=>e.id===id);if(!e)return;if(e.x1!=null){[e.x1,e.y1]=rot(e.x1,e.y1);}if(e.x2!=null){[e.x2,e.y2]=rot(e.x2,e.y2);}if(e.cx!=null){[e.cx,e.cy]=rot(e.cx,e.cy);}});return ids;} };
  window.cadScale       = (ids,cx,cy,sx,sy,mc) => { const sc=(x,y)=>[cx+(x-cx)*sx,cy+(y-cy)*sy]; if(mc){return ids.map(id=>{const e=ents.find(e=>e.id===id);if(!e)return -1;const ne=JSON.parse(JSON.stringify(e));ne.id=nextId++;if(ne.x1!=null){[ne.x1,ne.y1]=sc(ne.x1,ne.y1);}if(ne.x2!=null){[ne.x2,ne.y2]=sc(ne.x2,ne.y2);}if(ne.cx!=null){[ne.cx,ne.cy]=sc(ne.cx,ne.cy);ne.r*=Math.sqrt(Math.abs(sx*sy));}ents.push(ne);return ne.id;});}else{ids.forEach(id=>{const e=ents.find(e=>e.id===id);if(!e)return;if(e.x1!=null){[e.x1,e.y1]=sc(e.x1,e.y1);}if(e.x2!=null){[e.x2,e.y2]=sc(e.x2,e.y2);}if(e.cx!=null){[e.cx,e.cy]=sc(e.cx,e.cy);e.r*=Math.sqrt(Math.abs(sx*sy));}});return ids;} };
  window.cadMirror      = (ids,ax,ay,bx,by,mc) => { const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy; const mir=(x,y)=>{const t=((x-ax)*dx+(y-ay)*dy)/l2;return[2*(ax+t*dx)-x,2*(ay+t*dy)-y];}; if(mc){return ids.map(id=>{const e=ents.find(e=>e.id===id);if(!e)return -1;const ne=JSON.parse(JSON.stringify(e));ne.id=nextId++;if(ne.x1!=null){[ne.x1,ne.y1]=mir(ne.x1,ne.y1);}if(ne.x2!=null){[ne.x2,ne.y2]=mir(ne.x2,ne.y2);}if(ne.cx!=null){[ne.cx,ne.cy]=mir(ne.cx,ne.cy);}ents.push(ne);return ne.id;});}else{ids.forEach(id=>{const e=ents.find(e=>e.id===id);if(!e)return;if(e.x1!=null){[e.x1,e.y1]=mir(e.x1,e.y1);}if(e.x2!=null){[e.x2,e.y2]=mir(e.x2,e.y2);}if(e.cx!=null){[e.cx,e.cy]=mir(e.cx,e.cy);}});return ids;} };
  window.cadTrim        = () => 'null';
  window.cadExtend      = () => -1;
  window.cadFillet      = () => -1;
  window.cadChamfer     = () => -1;
  window.cadArrayRect   = (ids,rows,cols,rs,cs) => { const out=[]; ids.forEach(id=>{const e=ents.find(e=>e.id===id);if(!e)return;for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){if(r===0&&c===0)continue;const ne=JSON.parse(JSON.stringify(e));ne.id=nextId++;if(ne.x1!=null){ne.x1+=c*cs;ne.y1+=r*rs;}if(ne.x2!=null){ne.x2+=c*cs;ne.y2+=r*rs;}if(ne.cx!=null){ne.cx+=c*cs;ne.cy+=r*rs;}if(ne.points)ne.points=ne.points.map(p=>[p[0]+c*cs,p[1]+r*rs]);ents.push(ne);out.push(ne.id);}}); return out; };
  window.cadArrayPolar  = (ids,cx,cy,count,ang) => { const out=[],step=ang/count; ids.forEach(id=>{const e=ents.find(e=>e.id===id);if(!e)return;for(let i=1;i<count;i++){const r=i*step*Math.PI/180,cs=Math.cos(r),sn=Math.sin(r);const rot=(x,y)=>[cx+(x-cx)*cs-(y-cy)*sn,cy+(x-cx)*sn+(y-cy)*cs];const ne=JSON.parse(JSON.stringify(e));ne.id=nextId++;if(ne.x1!=null){[ne.x1,ne.y1]=rot(ne.x1,ne.y1);}if(ne.x2!=null){[ne.x2,ne.y2]=rot(ne.x2,ne.y2);}if(ne.cx!=null){[ne.cx,ne.cy]=rot(ne.cx,ne.cy);}if(ne.points)ne.points=ne.points.map(p=>rot(p[0],p[1]));ents.push(ne);out.push(ne.id);}}); return out; };
  window.cadOffset      = (ids,dist) => { const out=[]; ids.forEach(id=>{const e=ents.find(e=>e.id===id);if(!e)return;const ne=JSON.parse(JSON.stringify(e));ne.id=nextId++;if(e.type==='line'){const dx=e.x2-e.x1,dy=e.y2-e.y1,len=Math.hypot(dx,dy)||1;const px=-dy/len*dist,py=dx/len*dist;ne.x1+=px;ne.y1+=py;ne.x2+=px;ne.y2+=py;}else if(e.type==='circle'||e.type==='arc'){ne.r=Math.max(0,(e.r||0)+dist);}else{ne.x1=(e.x1||0)+dist;ne.y1=(e.y1||0)+dist;}ents.push(ne);out.push(ne.id);}); return out; };
  // ── Snap + Layer stubs (Task #5) ────────────────────────────────────────────
  window.cadFindSnap        = () => '';
  let _stubLayers = [{id:0,name:'0',color:'#ffffff',lineType:'Solid',lineWeight:0.25,visible:true,locked:false,frozen:false,printEnabled:true}];
  let _stubCurLayer = 0; let _stubNextLayer=1;
  window.cadGetLayers        = () => JSON.stringify(_stubLayers);
  window.cadGetCurrentLayer  = () => _stubCurLayer;
  window.cadSetCurrentLayer  = id => { _stubCurLayer=id; return true; };
  window.cadAddLayer         = (name,color) => { const id=_stubNextLayer++; _stubLayers.push({id,name,color,lineType:'Solid',lineWeight:0.25,visible:true,locked:false,frozen:false,printEnabled:true}); return id; };
  window.cadRemoveLayer      = id => { if(id===0)return false; const i=_stubLayers.findIndex(l=>l.id===id); if(i<0)return false; _stubLayers.splice(i,1); return true; };
  window.cadSetLayerName     = (id,n)  => { const l=_stubLayers.find(l=>l.id===id); if(l)l.name=n; return !!l; };
  window.cadSetLayerColor    = (id,c)  => { const l=_stubLayers.find(l=>l.id===id); if(l)l.color=c; return !!l; };
  window.cadSetLayerVisible   = (id,v)  => { const l=_stubLayers.find(l=>l.id===id); if(l)l.visible=v; return !!l; };
  window.cadSetLayerLocked    = (id,v)  => { const l=_stubLayers.find(l=>l.id===id); if(l)l.locked=v; return !!l; };
  window.cadSetLayerFrozen    = (id,v)  => { const l=_stubLayers.find(l=>l.id===id); if(l)l.frozen=v; return !!l; };
  window.cadSetLayerLineType  = (id,lt) => { const l=_stubLayers.find(l=>l.id===id); if(l)l.lineType=lt; return !!l; };
  window.cadSetLayerLineWeight= (id,lw) => { const l=_stubLayers.find(l=>l.id===id); if(l)l.lineWeight=lw; return !!l; };
  window.cadSetLayerPrint     = (id,v)  => { const l=_stubLayers.find(l=>l.id===id); if(l)l.printEnabled=v; return !!l; };
  wasmReady = true;
}

function w2s(wx,wy){ return [wx*zoom+panX+canvas.width/2, -wy*zoom+panY+canvas.height/2]; }
function s2w(sx,sy){ return [(sx-canvas.width/2-panX)/zoom, -(sy-canvas.height/2-panY)/zoom]; }

let snapEnabled = true;
let snapResult  = null;  // current SnapCandidate {x,y,type,entityID} or null
const SNAP_RADIUS_PX = 15; // screen pixels — converted to world units on each query

const snapColors = {
  Endpoint:'#ff4444', Midpoint:'#44ff44', Center:'#4488ff',
  Quadrant:'#ffaa00', Intersection:'#ff44ff', Perpendicular:'#00ffff',
  Tangent:'#ffff44', Nearest:'#aaaaaa',
};

// ─── Snap mode bitmask (Task #5) ─────────────────────────────────────────────
const SNAP_BITS = {
  'snp-endpoint':1,'snp-midpoint':2,'snp-center':4,'snp-quadrant':8,
  'snp-intersection':16,'snp-perpendicular':32,'snp-tangent':64,'snp-nearest':128,
};

function loadSnapSettings(){
  try {
    const saved = localStorage.getItem('gocad-snap');
    if(saved){
      const s=JSON.parse(saved);
      snapEnabled = s.enabled!==false;
      Object.entries(SNAP_BITS).forEach(([id])=>{
        const el=document.getElementById(id);
        if(el&&id in s) el.checked=s[id];
      });
    }
  } catch(_){}
}

function saveSnapSettings(){
  const s={enabled:snapEnabled};
  Object.entries(SNAP_BITS).forEach(([id])=>{
    const el=document.getElementById(id);
    if(el) s[id]=el.checked;
  });
  try{ localStorage.setItem('gocad-snap',JSON.stringify(s)); } catch(_){}
}

function snapMask(){
  let mask=0;
  Object.entries(SNAP_BITS).forEach(([id,bit])=>{
    const el=document.getElementById(id);
    if(el&&el.checked) mask|=bit;
  });
  return mask;
}

function setAllSnapModes(on){
  Object.keys(SNAP_BITS).forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.checked=on;
  });
  saveSnapSettings();
}

function closeSnapSettings(){
  document.getElementById('snap-settings').classList.remove('open');
  saveSnapSettings();
}

function updateSnapBtn(){
  const b=document.getElementById('btn-snap');
  if(snapEnabled){b.className='snap-on';b.textContent='Snap ✓';}
  else{b.className='';b.textContent='Snap ✗';}
}

function snapWorldPt(wx, wy){
  if(!snapEnabled||!wasmReady) return [wx,wy];
  const worldRadius = SNAP_RADIUS_PX / zoom;
  const mask = snapMask();
  const raw = window.cadFindSnap(wx, wy, worldRadius, mask);
  if(!raw) { snapResult=null; return [wx,wy]; }
  snapResult = JSON.parse(raw);
  return [snapResult.x, snapResult.y];
}

function drawSnapMarker(){
  const marker = document.getElementById('snap-marker');
  const svg    = document.getElementById('snap-svg');
  if(!snapResult||!snapEnabled){marker.style.display='none';return;}
  const [sx,sy] = w2s(snapResult.x, snapResult.y);
  const col = snapColors[snapResult.type] || '#ffffff';
  marker.style.display = 'block';
  marker.style.left = (sx-10)+'px';
  marker.style.top  = (sy-10)+'px';
  // Draw shape based on snap type
  let shape = '';
  switch(snapResult.type){
    case 'Endpoint':
      shape=`<rect x="-6" y="-6" width="12" height="12" fill="none" stroke="${col}" stroke-width="1.5"/>`;
      break;
    case 'Midpoint':
      shape=`<polygon points="0,-7 7,5 -7,5" fill="none" stroke="${col}" stroke-width="1.5"/>`;
      break;
    case 'Center':
      shape=`<circle r="6" fill="none" stroke="${col}" stroke-width="1.5"/>
             <line x1="-4" y1="0" x2="4" y2="0" stroke="${col}" stroke-width="1"/>
             <line x1="0" y1="-4" x2="0" y2="4" stroke="${col}" stroke-width="1"/>`;
      break;
    case 'Quadrant':
      shape=`<polygon points="0,-7 7,0 0,7 -7,0" fill="none" stroke="${col}" stroke-width="1.5"/>`;
      break;
    case 'Intersection':
      shape=`<line x1="-7" y1="-7" x2="7" y2="7" stroke="${col}" stroke-width="1.5"/>
             <line x1="7" y1="-7" x2="-7" y2="7" stroke="${col}" stroke-width="1.5"/>`;
      break;
    case 'Perpendicular':
      shape=`<line x1="-7" y1="7" x2="-7" y2="-4" stroke="${col}" stroke-width="1.5"/>
             <line x1="-7" y1="-4" x2="5" y2="-4" stroke="${col}" stroke-width="1.5"/>
             <line x1="-7" y1="0" x2="-3" y2="0" stroke="${col}" stroke-width="1"/>
             <line x1="-3" y1="0" x2="-3" y2="-4" stroke="${col}" stroke-width="1"/>`;
      break;
    case 'Tangent':
      shape=`<circle r="6" fill="none" stroke="${col}" stroke-width="1.5"/>
             <line x1="-7" y1="0" x2="7" y2="0" stroke="${col}" stroke-width="1.5"/>`;
      break;
    default:
      shape=`<circle r="4" fill="${col}" opacity="0.5"/>`;
  }
  svg.innerHTML=shape;
}

function setTool(name){
  currentTool=name; clicks=[]; tempPt=null; pendingText=null; editPickIds=[];
  document.querySelectorAll('#toolbar button[id^="tool-"]').forEach(b=>{
    b.classList.toggle('active', b.id==='tool-'+name);
  });

function dist(a,b){ return Math.hypot(b[0]-a[0],b[1]-a[1]); }

function commitEntity(){
  const c=clicks, layer=currentLayer, color=currentColor;
  switch(currentTool){
    case 'line':    window.cadAddLine(c[0][0],c[0][1],c[1][0],c[1][1],layer,color); break;
    case 'circle':  window.cadAddCircle(c[0][0],c[0][1],dist(c[0],c[1]),layer,color); break;
    case 'arc': {
      const r=dist(c[0],c[1]);
      const a1=Math.atan2(c[1][1]-c[0][1],c[1][0]-c[0][0])*180/Math.PI;
      const a2=Math.atan2(c[2][1]-c[0][1],c[2][0]-c[0][0])*180/Math.PI;
      window.cadAddArc(c[0][0],c[0][1],r,a1,a2,layer,color); break;
    }
    case 'rect':    window.cadAddRectangle(c[0][0],c[0][1],c[1][0],c[1][1],layer,color); break;
    case 'poly':    if(c.length>=2) window.cadAddPolyline(c.map(p=>p.slice()),layer,color); break;
    case 'spline':  if(c.length>=4) window.cadAddSpline(c.map(p=>p.slice()),layer,color); break;
    case 'nurbs':   if(c.length>=4) window.cadAddNURBS(3,c.map(p=>p.slice()),null,null,layer,color); break;
    case 'ellipse':{
      const a=dist(c[0],c[1]);
      const b=dist(c[0],c[2]);
      const rot=Math.atan2(c[1][1]-c[0][1],c[1][0]-c[0][0])*180/Math.PI;
      window.cadAddEllipse(c[0][0],c[0][1],a,b,rot,layer,color); break;
    }
    case 'text':
      if(!pendingText){pendingText=null;return;}
      window.cadAddText(c[0][0],c[0][1],pendingText,2.5,0,'Standard',layer,color);
      pendingText=null; break;
    case 'mtext':
      if(!pendingText){pendingText=null;return;}
      // Replace JS \n escape sequences with actual newlines if user typed them literally
      const content=pendingText.replace(/\\n/g,'\n');
      window.cadAddMText(c[0][0],c[0][1],content,3.0,100,0,'Standard',layer,color);
      pendingText=null; break;
    case 'dimlin':{
      const off=c[2][1]-((c[0][1]+c[1][1])/2);
      window.cadAddLinearDim(c[0][0],c[0][1],c[1][0],c[1][1],off,layer,color); break;
    }
    case 'dimali':{
      // Signed perpendicular distance from third click to the baseline segment.
      const bx=c[1][0]-c[0][0], by=c[1][1]-c[0][1];
      const bLen=Math.hypot(bx,by)||1;
      // Perpendicular unit vector (baseline rotated 90° CCW).
      const px=-by/bLen, py=bx/bLen;
      const off=(c[2][0]-c[0][0])*px+(c[2][1]-c[0][1])*py;
      window.cadAddAlignedDim(c[0][0],c[0][1],c[1][0],c[1][1],off,layer,color); break;
    }
    case 'dimang':{
      const r=dist(c[0],c[3]);
      window.cadAddAngularDim(c[0][0],c[0][1],c[1][0],c[1][1],c[2][0],c[2][1],r,layer,color); break;
    }
    case 'dimrad':{
      const ang=Math.atan2(c[1][1]-c[0][1],c[1][0]-c[0][0])*180/Math.PI;
      window.cadAddRadialDim(c[0][0],c[0][1],dist(c[0],c[1]),ang,layer,color); break;
    }
    case 'dimdia':{
      const ang=Math.atan2(c[1][1]-c[0][1],c[1][0]-c[0][0])*180/Math.PI;
      window.cadAddDiameterDim(c[0][0],c[0][1],dist(c[0],c[1]),ang,layer,color); break;
    }
  }
  clicks=[];
  render();
}

// ─── Mouse events ─────────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e=>{
  if(e.button===1||(e.button===0&&e.altKey)){
    isPanning=true; panStart={x:e.clientX-panX,y:e.clientY-panY};
    canvas.style.cursor='grabbing'; return;
  }
  if(e.button===2){
    if(['poly','spline','nurbs'].includes(currentTool)) commitEntity();
    return;
  }
  if(!wasmReady) return;
  const rect=canvas.getBoundingClientRect();
  let [wx,wy]=s2w(e.clientX-rect.left,e.clientY-rect.top);
  // Apply snap (Task #5) — snap overrides raw cursor position
  [wx,wy]=snapWorldPt(wx,wy);
  if((currentTool==='text'||currentTool==='mtext')&&clicks.length===0){
    clicks.push([wx,wy]);
    setStatus('Type your text in the command bar and press Enter.');
    return;
  }

  // ── Edit tools with special click workflows ──────────────────────────────
  if(currentTool==='mirror'){
    clicks.push([wx,wy]);
    if(clicks.length>=2){
      if(wasmReady&&selectedId){
        // editPickIds[0]==='copy' means mirror-copy mode (keep original)
        const makeCopy = editPickIds[0]==='copy';
        const newIDs=JSON.parse(window.cadMirror([selectedId],
          clicks[0][0],clicks[0][1],clicks[1][0],clicks[1][1],makeCopy)||'[]');
        if(makeCopy && newIDs.length>0) selectedId=newIDs[0];
        setStatus(makeCopy?'Mirror-Copy applied.':'Mirror applied.');
      } else setStatus('Mirror: no entity selected.');
      editPickIds=[]; clicks=[];
    } else {
      setStatus('Mirror: click second point on the mirror axis.');
    }
    render(); return;
  }
  if(currentTool==='trim'){
    if(editPickIds.length===0){
      const cutterID=wasmReady?window.cadNearestEntity(wx,wy,50/zoom):0;
      if(cutterID){
        editPickIds=[cutterID]; selectedId=cutterID;
        setStatus(`Trim: cutter selected (ID ${cutterID}). Click the part to remove.`);
      } else setStatus('Trim: no entity near click — try again.');
    } else {
      const cutter=editPickIds[0];
      const targetID=wasmReady?window.cadNearestEntity(wx,wy,50/zoom):0;
      if(targetID&&targetID!==cutter){
        const res=JSON.parse(window.cadTrim(cutter,targetID,wx,wy)||'null');
        setStatus(res?`Trim OK (${res.length} piece(s) kept).`:'Trim: no intersection found.');
        editPickIds=[];
      } else setStatus('Trim: click a different entity to trim.');
    }
    render(); return;
  }
  if(currentTool==='extend'){
    if(editPickIds.length===0){
      const boundID=wasmReady?window.cadNearestEntity(wx,wy,50/zoom):0;
      if(boundID){
        editPickIds=[boundID]; selectedId=boundID;
        setStatus(`Extend: boundary selected (ID ${boundID}). Click near the end to extend.`);
      } else setStatus('Extend: no entity near click — try again.');
    } else {
      const bound=editPickIds[0];
      const targetID=wasmReady?window.cadNearestEntity(wx,wy,50/zoom):0;
      if(targetID&&targetID!==bound){
        const newID=window.cadExtend(bound,targetID,wx,wy);
        setStatus(newID>=0?`Extend OK (entity ${newID}).`:'Extend: no intersection found.');
        editPickIds=[];
      } else setStatus('Extend: click a different entity to extend.');
    }
    render(); return;
  }
  if(currentTool==='fillet'&&editPickIds.length>=2){
    // editPickIds = [firstLineID, radius]
    const secondID=wasmReady?window.cadNearestEntity(wx,wy,50/zoom):0;
    if(secondID&&secondID!==editPickIds[0]){
      const arcID=window.cadFillet(editPickIds[0],secondID,editPickIds[1]||5);
      setStatus(arcID>=0?`Fillet OK (arc ID ${arcID}).`:'Fillet: failed — lines must intersect/be close.');
    } else setStatus('Fillet: click a different line entity.');
    editPickIds=[]; setTool('line'); render(); return;
  }
  if(currentTool==='chamfer'&&editPickIds.length>=3){
    // editPickIds = [firstLineID, d1, d2]
    const secondID=wasmReady?window.cadNearestEntity(wx,wy,50/zoom):0;
    if(secondID&&secondID!==editPickIds[0]){
      const lineID=window.cadChamfer(editPickIds[0],secondID,editPickIds[1],editPickIds[2]);
      setStatus(lineID>=0?`Chamfer OK (line ID ${lineID}).`:'Chamfer: failed — lines must intersect/be close.');
    } else setStatus('Chamfer: click a different line entity.');
    editPickIds=[]; setTool('line'); render(); return;
  }
  // ── Suppress clicks for command-bar-only edit tools ─────────────────────
  if([-99].includes(toolClicks[currentTool])){
    render(); return;
  }

  clicks.push([wx,wy]);
  const req=toolClicks[currentTool];
  if(req>0&&clicks.length>=req) commitEntity();
  render();
});

// ─── Command bar ──────────────────────────────────────────────────────────────
const cmdInput=document.getElementById('cmd-input');
cmdInput.addEventListener('keydown', e=>{
  if(e.key!=='Enter') return;
  const raw=cmdInput.value.trim(); cmdInput.value='';
  if((currentTool==='text'||currentTool==='mtext')&&clicks.length===1&&pendingText===null){
    pendingText=raw||'Text'; commitEntity(); return;
  }
  const cmd=raw.toUpperCase();
  const toolMap={
    LINE:'line',L:'line',
    CIRCLE:'circle',C:'circle',
    ARC:'arc',A:'arc',
    RECT:'rect',RECTANGLE:'rect',R:'rect',
    POLY:'poly',POLYLINE:'poly',P:'poly',
    SPLINE:'spline',SP:'spline',S:'spline',
    NURBS:'nurbs',N:'nurbs',
    ELLIPSE:'ellipse',EL:'ellipse',E:'ellipse',
    TEXT:'text',T:'text',
    MTEXT:'mtext',MT:'mtext',
    DIMLIN:'dimlin',DIMALI:'dimali',DIMANG:'dimang',DIMRAD:'dimrad',DIMDIA:'dimdia',
    UNDO:'undo',U:'undo',REDO:'redo',
    DELETE:'delete',DEL:'delete',ERASE:'delete',
    CLEAR:'clear',
    ZOOMFIT:'zoomfit',ZF:'zoomfit',Z:'zoomfit',
    EXPORT:'export',DXF:'export',
    // ── Edit ops (Task #4) ────────────────────────────────────────────────────
    MOVE:'move',M:'move',
    COPY:'copy',CP:'copy',CO:'copy',
    ROTATE:'rotate',RO:'rotate',
    SCALE:'scale',SC:'scale',
    MIRROR:'mirror',MI:'mirror',
    TRIM:'trim',TR:'trim',
    EXTEND:'extend',EX:'extend',
    FILLET:'fillet',F:'fillet',
    CHAMFER:'chamfer',CHA:'chamfer',
    ARRAYRECT:'arrayrect',AR:'arrayrect',
    ARRAYPOLAR:'arraypolar',AP:'arraypolar',
    OFFSET:'offset',O:'offset',
  };

  // ── Handle parametric edit commands (MOVE dx dy, ROTATE angle, etc.) ─────
  // Normalize short aliases so "M 10 5" works identically to "MOVE 10 5".
  const parts = raw.trim().split(/\s+/);
  const rawVerb = parts[0].toUpperCase();
  // Map short alias → full upper-case verb (e.g. 'M'→'MOVE', 'CP'→'COPY').
  const verbAliases = {
    M:'MOVE', CP:'COPY', CO:'COPY', RO:'ROTATE', SC:'SCALE',
    MI:'MIRROR', TR:'TRIM', EX:'EXTEND', F:'FILLET', CHA:'CHAMFER',
    AR:'ARRAYRECT', AP:'ARRAYPOLAR', O:'OFFSET',
  };
  const verb = verbAliases[rawVerb] || rawVerb;

  if(wasmReady && selectedId && verb==='MOVE' && parts.length>=3){
    const dx=parseFloat(parts[1]),dy=parseFloat(parts[2]);
    window.cadMove([selectedId],dx,dy); render(); return;
  }
  if(wasmReady && selectedId && verb==='COPY' && parts.length>=3){
    const dx=parseFloat(parts[1]),dy=parseFloat(parts[2]);
    const newIDs=JSON.parse(window.cadCopy([selectedId],dx,dy)||'[]');
    if(newIDs.length>0) selectedId=newIDs[0];
    render(); return;
  }
  if(wasmReady && selectedId && (verb==='ROTATE'||verb==='ROTATECOPY') && parts.length>=2){
    const makeCopy = verb==='ROTATECOPY';
    const ang=parseFloat(parts[1]);
    // ROTATE angle [cx cy]  |  ROTATECOPY angle [cx cy]
    const cx=parts.length>=4?parseFloat(parts[2]):0;
    const cy=parts.length>=4?parseFloat(parts[3]):0;
    const newIDs=JSON.parse(window.cadRotate([selectedId],cx,cy,ang,makeCopy)||'[]');
    if(makeCopy && newIDs.length>0) selectedId=newIDs[0];
    render(); return;
  }
  if(wasmReady && selectedId && (verb==='SCALE'||verb==='SCALECOPY') && parts.length>=2){
    // Supported forms (uniform preferred in hints):
    //   SCALE factor            → uniform in-place, base at origin
    //   SCALE factor cx cy      → uniform in-place, base at (cx,cy)
    //   SCALE sx sy             → non-uniform in-place, base at origin
    //   SCALE sx sy cx cy       → non-uniform in-place, base at (cx,cy)
    // Append 'COPY' to any form to keep the original (e.g. SCALECOPY 2).
    const makeCopy = verb==='SCALECOPY';
    const sx=parseFloat(parts[1]);
    let sy=sx, cx=0, cy=0;
    if(parts.length===4){        // SCALE factor cx cy (uniform with base)
      cx=parseFloat(parts[2]); cy=parseFloat(parts[3]);
    } else if(parts.length===3){ // SCALE sx sy (non-uniform, no base)
      sy=parseFloat(parts[2]);
    } else if(parts.length>=5){  // SCALE sx sy cx cy
      sy=parseFloat(parts[2]); cx=parseFloat(parts[3]); cy=parseFloat(parts[4]);
    }
    const newIDs=JSON.parse(window.cadScale([selectedId],cx,cy,sx,sy,makeCopy)||'[]');
    if(makeCopy && newIDs.length>0) selectedId=newIDs[0];
    render(); return;
  }
  if(wasmReady && selectedId && verb==='MIRRORCOPY' && parts.length>=1){
    // MIRRORCOPY — like Mirror tool but creates a copy; 2 canvas clicks define axis.
    editPickIds=['copy'];  // flag: copy mode
    setTool('mirror');
    setStatus('Mirror-Copy: click first point on mirror axis.'); return;
  }
  if(wasmReady && (currentTool==='fillet') && editPickIds.length===1 && verb==='FILLET' && parts.length>=2){
    // waiting for second line click, radius given via command
    const r=parseFloat(parts[1]);
    setStatus(`Fillet r=${r}: now click the second line.`);
    editPickIds.push(r); // store radius temporarily at index 1
    return;
  }
  if(wasmReady && selectedId && verb==='FILLET' && parts.length>=2){
    const r=parseFloat(parts[1]);
    // Store first line and radius; next click selects second line
    editPickIds=[selectedId,r];
    setTool('fillet');
    setStatus(`Fillet r=${r}: click the second line.`);
    return;
  }
  if(wasmReady && selectedId && verb==='CHAMFER' && parts.length>=3){
    const d1=parseFloat(parts[1]),d2=parseFloat(parts[2]);
    editPickIds=[selectedId,d1,d2];
    setTool('chamfer');
    setStatus(`Chamfer d1=${d1} d2=${d2}: click the second line.`);
    return;
  }
  if(wasmReady && selectedId && verb==='ARRAYRECT' && parts.length>=5){
    const rows=parseInt(parts[1]),cols=parseInt(parts[2]);
    const rs=parseFloat(parts[3]),cs=parseFloat(parts[4]);
    JSON.parse(window.cadArrayRect([selectedId],rows,cols,rs,cs)||'[]');
    render(); return;
  }
  if(wasmReady && selectedId && verb==='ARRAYPOLAR' && parts.length>=3){
    const count=parseInt(parts[1]),ang=parseFloat(parts[2]);
    const cx=parts.length>=5?parseFloat(parts[3]):0;
    const cy=parts.length>=5?parseFloat(parts[4]):0;
    JSON.parse(window.cadArrayPolar([selectedId],cx,cy,count,ang)||'[]');
    render(); return;
  }
  if(wasmReady && selectedId && verb==='OFFSET' && parts.length>=2){
    const dist=parseFloat(parts[1]);
    const newIDs=JSON.parse(window.cadOffset([selectedId],dist)||'[]');
    if(newIDs.length>0) setStatus(`Offset OK: ${newIDs.length} new entity(ies).`);
    else setStatus('Offset: failed (entity type may not support offset).');
    render(); return;
  }

  const action=toolMap[cmd];
  if(!action){setStatus(`Unknown command: ${raw}`);return;}
  switch(action){
    case 'undo':    if(wasmReady)window.cadUndo();render();break;
    case 'redo':    if(wasmReady)window.cadRedo();render();break;
    case 'delete':  if(wasmReady&&selectedId)window.cadDeleteEntity(selectedId);selectedId=0;render();break;
    case 'clear':   if(wasmReady)window.cadClear();render();break;
    case 'zoomfit': zoomFit();break;
    case 'export':  exportDXF();break;
    default: setTool(action);
  }
});

// ─── Utilities ────────────────────────────────────────────────────────────────
function setStatus(msg){document.getElementById('status').textContent=msg;}

function zoomFit(){
  if(!wasmReady) return;
  const es=JSON.parse(window.cadEntities()||'[]');
  if(!es.length){panX=0;panY=0;zoom=1;render();return;}
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  es.forEach(e=>entitySamplePoints(e).forEach(([x,y])=>{
    if(x<minX)minX=x;if(y<minY)minY=y;if(x>maxX)maxX=x;if(y>maxY)maxY=y;
  }));
  if(!isFinite(minX)){panX=0;panY=0;zoom=1;render();return;}
  const padX=(maxX-minX)*0.1+10,padY=(maxY-minY)*0.1+10;
  minX-=padX;maxX+=padX;minY-=padY;maxY+=padY;
  zoom=Math.min(canvas.width/(maxX-minX),canvas.height/(maxY-minY));
  panX=canvas.width/2-((minX+maxX)/2)*zoom;
  panY=canvas.height/2+((minY+maxY)/2)*zoom;
  render();
}

function entitySamplePoints(e){
  switch(e.type){
    case 'line': return[[e.x1,e.y1],[e.x2,e.y2]];
    case 'circle':case 'arc':
      return[[e.cx+e.r,e.cy],[e.cx-e.r,e.cy],[e.cx,e.cy+e.r],[e.cx,e.cy-e.r]];
    case 'rectangle': return[[e.x1,e.y1],[e.x2,e.y2]];
    case 'polyline':case 'spline':case 'nurbs': return e.points||[];
    case 'ellipse': return[[e.cx+(e.r||0),e.cy],[e.cx-(e.r||0),e.cy],
                           [e.cx,e.cy+(e.r2||0)],[e.cx,e.cy-(e.r2||0)]];
    case 'text':case 'mtext': return[[e.x1,e.y1]];
    default: return e.cx!=null?[[e.cx,e.cy]]:[[e.x1||0,e.y1||0],[e.x2||0,e.y2||0]];
  }
}

// ─── NURBS evaluator (JavaScript, for canvas rendering) ───────────────────────
function nurbsBasis(i,k,knots,t){
  if(k===0) return knots[i]<=t&&t<knots[i+1]?1:0;
  const d1=knots[i+k]-knots[i], d2=knots[i+k+1]-knots[i+1];
  let l=0,r=0;
  if(d1>1e-10) l=(t-knots[i])/d1*nurbsBasis(i,k-1,knots,t);
  if(d2>1e-10) r=(knots[i+k+1]-t)/d2*nurbsBasis(i+1,k-1,knots,t);
  return l+r;
}

function nurbsEval(deg,controls,knots,weights,t){
  let wx=0,wy=0,w=0;
  for(let i=0;i<controls.length;i++){
    const b=nurbsBasis(i,deg,knots,t);
    const wi=weights?weights[i]:1;
    const bw=b*wi;
    wx+=bw*controls[i][0]; wy+=bw*controls[i][1]; w+=bw;
  }
  if(w<1e-10) return controls[0]||[0,0];
  return [wx/w,wy/w];
}

function clampedUniformKnots(n,deg){
  const m=n+deg+1, knots=new Array(m).fill(0);
  const inner=n-deg;
  for(let i=0;i<=deg;i++) knots[i]=0;
  for(let i=1;i<inner;i++) knots[deg+i]=i/inner;
  for(let i=n;i<m;i++) knots[i]=1;
  return knots;
}

// ─── Renderer ─────────────────────────────────────────────────────────────────
const ARROW=8;

function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGrid();
  if(!wasmReady){
    ctx.fillStyle='#666';ctx.font='14px sans-serif';ctx.textAlign='center';
    ctx.fillText('Loading WASM…',canvas.width/2,canvas.height/2);
    return;
  }
  // Build layer cache (id→layer) for BYLAYER color+linetype resolution (Task #5)
  const hiddenLayers = new Set();
  window._layerCache = {};
  try {
    const layers=JSON.parse(window.cadGetLayers()||'[]');
    layers.forEach(l=>{
      window._layerCache[l.id]=l;
      if(!l.visible||l.frozen) hiddenLayers.add(l.id);
    });
  } catch(_){}

  const entities=JSON.parse(window.cadEntities()||'[]');
  entities.forEach(e=>{
    if(hiddenLayers.has(e.layer)) return; // skip frozen/invisible layers
    drawEntity(e,e.id===selectedId);
  });
  drawPreview();
  if(tempPt){
    const [sx,sy]=w2s(tempPt[0],tempPt[1]);
    ctx.save(); ctx.strokeStyle='rgba(255,255,255,0.2)';
    ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(sx,0);ctx.lineTo(sx,canvas.height);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,sy);ctx.lineTo(canvas.width,sy);ctx.stroke();
    ctx.restore();
  }
  drawSnapMarker();
}

function drawGrid(){
  const step=Math.max(10,Math.round(50/zoom)*10);
  const [,oy]=w2s(0,0); const [ox]=w2s(0,0);
  ctx.save(); ctx.lineWidth=1;
  ctx.strokeStyle='rgba(255,255,255,0.05)';
  const sX=Math.floor((-panX-canvas.width/2)/(zoom*step))*step;
  for(let wx=sX;wx<sX+canvas.width/zoom+step;wx+=step){
    const [sx]=w2s(wx,0);
    ctx.beginPath();ctx.moveTo(sx,0);ctx.lineTo(sx,canvas.height);ctx.stroke();
  }
  const sY=Math.floor((-panY-canvas.height/2)/(zoom*step))*step;
  for(let wy=sY;wy<sY+canvas.height/zoom+step;wy+=step){
    const [,sy]=w2s(0,wy);
    ctx.beginPath();ctx.moveTo(0,sy);ctx.lineTo(canvas.width,sy);ctx.stroke();
  }
  ctx.strokeStyle='rgba(255,255,255,0.12)';
  ctx.beginPath();ctx.moveTo(0,oy);ctx.lineTo(canvas.width,oy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ox,0);ctx.lineTo(ox,canvas.height);ctx.stroke();
  ctx.restore();
}

// ─── Line dash patterns for layer LineTyp (Task #5) ──────────────────────────
const LAYER_DASH = {
  Solid:   [],
  Dashed:  [8,4],
  Dotted:  [1,4],
  DashDot: [8,4,1,4],
  Center:  [16,4,4,4],
  Hidden:  [4,4],
};

// Resolve BYLAYER color and line type from the cached layer map.
// Color: use entity's explicit color unless it is BYLAYER/empty → inherit from layer.
// LineType: always inherited from layer (entities don't store an explicit linetype).
// Returns {color, dash[]} for drawing.
function resolveEntityStyle(e, sel){
  if(sel) return {color:'#ff9800', dash:[]};
  let color = e.color || '';
  let dash   = [];
  const lyr = window._layerCache ? (window._layerCache[e.layer||0]||null) : null;
  // Linetype is always taken from the layer (BYLAYER by default in CAD)
  if(lyr) dash = LAYER_DASH[lyr.lineType] || [];
  // Color: BYLAYER or missing → use layer color
  if(!color || color.toUpperCase()==='BYLAYER'){
    color = lyr ? lyr.color : '#ffffff';
  }
  if(!color) color='#ffffff';
  return {color, dash};
}

function drawEntity(e,sel=false){
  const {color:col, dash} = resolveEntityStyle(e, sel);
  ctx.save(); ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=sel?2:1;
  if(dash&&dash.length) ctx.setLineDash(dash); else ctx.setLineDash([]);
  switch(e.type){
    case 'line':{
      const[x1,y1]=w2s(e.x1,e.y1),[x2,y2]=w2s(e.x2,e.y2);
      ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke(); break;
    }
    case 'circle':{
      const[cx,cy]=w2s(e.cx,e.cy);
      ctx.beginPath();ctx.arc(cx,cy,e.r*zoom,0,2*Math.PI);ctx.stroke(); break;
    }
    case 'arc':{
      const[cx,cy]=w2s(e.cx,e.cy);
      const a1=-e.startDeg*Math.PI/180,a2=-e.endDeg*Math.PI/180;
      ctx.beginPath();ctx.arc(cx,cy,e.r*zoom,a1,a2,a1>a2);ctx.stroke(); break;
    }
    case 'rectangle':{
      const[x1,y1]=w2s(e.x1,e.y1),[x2,y2]=w2s(e.x2,e.y2);
      ctx.beginPath();ctx.rect(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1),Math.abs(y2-y1));
      ctx.stroke(); break;
    }
    case 'polyline':
      drawPolylineScrPts(ctx,(e.points||[]).map(p=>w2s(p[0],p[1]))); break;
    case 'spline':
      drawBezierSpline(ctx,(e.points||[]).map(p=>w2s(p[0],p[1]))); break;
    case 'nurbs':
      drawNURBSEntity(ctx,e); break;
    case 'ellipse':{
      const[cx,cy]=w2s(e.cx,e.cy);
      ctx.beginPath();
      ctx.ellipse(cx,cy,(e.r||1)*zoom,(e.r2||e.r||1)*zoom,-(e.rotDeg||0)*Math.PI/180,0,2*Math.PI);
      ctx.stroke(); break;
    }
    case 'text':{
      const[sx,sy]=w2s(e.x1,e.y1);
      const h=Math.max(8,(e.textHeight||2.5)*zoom);
      ctx.save();ctx.translate(sx,sy);ctx.rotate(-(e.rotDeg||0)*Math.PI/180);
      ctx.font=`${h}px ${e.font||'monospace'}`;ctx.fillText(e.text||'',0,0);
      ctx.restore(); break;
    }
    case 'mtext':{
      const[sx,sy]=w2s(e.x1,e.y1);
      const h=Math.max(8,(e.textHeight||3)*zoom);
      const lines=(e.text||'').split('\n');
      ctx.save();ctx.translate(sx,sy);ctx.rotate(-(e.rotDeg||0)*Math.PI/180);
      ctx.font=`${h}px ${e.font||'monospace'}`;
      lines.forEach((ln,i)=>ctx.fillText(ln,0,i*h*1.5));
      ctx.restore(); break;
    }
    case 'dimlin':case 'dimali': drawLinearDim(ctx,e,col); break;
    case 'dimang': drawAngularDim(ctx,e,col); break;
    case 'dimrad': drawRadialDim(ctx,e,col,false); break;
    case 'dimdia': drawRadialDim(ctx,e,col,true); break;
  }
  ctx.restore();
}

// ── Spline renderers ──────────────────────────────────────────────────────────
function drawPolylineScrPts(c2,pts){
  if(pts.length<2) return;
  c2.beginPath();c2.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<pts.length;i++) c2.lineTo(pts[i][0],pts[i][1]);
  c2.stroke();
}

function drawBezierSpline(c2,pts){
  if(pts.length<4){drawPolylineScrPts(c2,pts);return;}
  const nSegs=Math.floor((pts.length-1)/3);
  c2.beginPath();c2.moveTo(pts[0][0],pts[0][1]);
  for(let i=0;i<nSegs;i++){
    const b=i*3;
    c2.bezierCurveTo(pts[b+1][0],pts[b+1][1],pts[b+2][0],pts[b+2][1],pts[b+3][0],pts[b+3][1]);
  }
  c2.stroke();
}

function drawNURBSEntity(c2,e){
  const controls=e.points||[];
  const n=controls.length;
  if(n<2) return;
  const deg=e.nurbsDeg||3;
  const knots=e.knots&&e.knots.length>=n+deg+1?e.knots:clampedUniformKnots(n,deg);
  const weights=e.weights;
  const lo=knots[deg], hi=knots[n];
  const samples=Math.max(50,n*15);
  c2.beginPath();
  for(let k=0;k<=samples;k++){
    let t=lo+(k/samples)*(hi-lo);
    if(t>=hi) t=hi-1e-10;
    const[wx,wy]=nurbsEval(deg,controls,knots,weights,t);
    const[sx,sy]=w2s(wx,wy);
    if(k===0) c2.moveTo(sx,sy); else c2.lineTo(sx,sy);
  }
  c2.stroke();
}

// ── Dimension renderers ───────────────────────────────────────────────────────
function screenArrow(c2,px,py,dx,dy){
  const len=Math.hypot(dx,dy); if(len<0.01)return;
  const ux=dx/len,uy=dy/len,sz=ARROW;
  c2.beginPath();
  c2.moveTo(px,py);
  c2.lineTo(px-ux*sz+uy*sz*0.4,py-uy*sz-ux*sz*0.4);
  c2.lineTo(px-ux*sz-uy*sz*0.4,py-uy*sz+ux*sz*0.4);
  c2.closePath();c2.fill();
}

function drawLinearDim(c2,e,col){
  const dx=e.x2-e.x1,dy=e.y2-e.y1;
  const isH=Math.abs(dx)>=Math.abs(dy);
  const off=e.cx||30;
  let d1x,d1y,d2x,d2y;
  if(e.type==='dimali'){
    const len=Math.hypot(dx,dy)||1;
    const ux=dx/len,uy=dy/len,px=-uy,py=ux;
    d1x=e.x1+px*off;d1y=e.y1+py*off;d2x=e.x2+px*off;d2y=e.y2+py*off;
  } else {
    if(isH){const dY=(e.y1+e.y2)/2-off;d1x=e.x1;d1y=dY;d2x=e.x2;d2y=dY;}
    else    {const dX=(e.x1+e.x2)/2-off;d1x=dX;d1y=e.y1;d2x=dX;d2y=e.y2;}
  }
  const[sx1,sy1]=w2s(e.x1,e.y1),[sx2,sy2]=w2s(e.x2,e.y2);
  const[sd1x,sd1y]=w2s(d1x,d1y),[sd2x,sd2y]=w2s(d2x,d2y);
  c2.save();c2.strokeStyle=col;c2.fillStyle=col;c2.lineWidth=1;
  c2.beginPath();c2.moveTo(sx1,sy1);c2.lineTo(sd1x,sd1y);c2.stroke();
  c2.beginPath();c2.moveTo(sx2,sy2);c2.lineTo(sd2x,sd2y);c2.stroke();
  c2.beginPath();c2.moveTo(sd1x,sd1y);c2.lineTo(sd2x,sd2y);c2.stroke();
  screenArrow(c2,sd1x,sd1y,sd2x-sd1x,sd2y-sd1y);
  screenArrow(c2,sd2x,sd2y,sd1x-sd2x,sd1y-sd2y);
  const val=Math.hypot(e.x2-e.x1,e.y2-e.y1).toFixed(2);
  c2.font='11px sans-serif';c2.textAlign='center';
  c2.fillText(val,(sd1x+sd2x)/2,(sd1y+sd2y)/2-5);
  c2.restore();
}

function drawAngularDim(c2,e,col){
  const ang1=Math.atan2(e.y1-e.cy,e.x1-e.cx);
  const ang2=Math.atan2(e.y2-e.cy,e.x2-e.cx);
  let span=ang2-ang1; if(span<0)span+=2*Math.PI;
  const r=(e.r||30)*zoom;
  const[csx,csy]=w2s(e.cx,e.cy);
  c2.save();c2.strokeStyle=col;c2.fillStyle=col;c2.lineWidth=1;
  c2.beginPath();c2.arc(csx,csy,r,-ang1,-(ang1+span),span>Math.PI);c2.stroke();
  c2.beginPath();c2.moveTo(csx,csy);c2.lineTo(csx+Math.cos(ang1)*r,csy-Math.sin(ang1)*r);c2.stroke();
  c2.beginPath();c2.moveTo(csx,csy);c2.lineTo(csx+Math.cos(ang2)*r,csy-Math.sin(ang2)*r);c2.stroke();
  const midAng=ang1+span/2;
  c2.font='11px sans-serif';c2.textAlign='center';
  c2.fillText(`${(span*180/Math.PI).toFixed(1)}°`,
    csx+Math.cos(midAng)*r*1.3,csy-Math.sin(midAng)*r*1.3);
  c2.restore();
}

function drawRadialDim(c2,e,col,diameter){
  const ang=(e.rotDeg||0)*Math.PI/180;
  const[csx,csy]=w2s(e.cx,e.cy);
  const rx=csx+Math.cos(ang)*e.r*zoom, ry=csy-Math.sin(ang)*e.r*zoom;
  c2.save();c2.strokeStyle=col;c2.fillStyle=col;c2.lineWidth=1;
  if(diameter){
    const rx2=csx-Math.cos(ang)*e.r*zoom,ry2=csy+Math.sin(ang)*e.r*zoom;
    c2.beginPath();c2.moveTo(rx,ry);c2.lineTo(rx2,ry2);c2.stroke();
    screenArrow(c2,rx,ry,rx-rx2,ry-ry2);screenArrow(c2,rx2,ry2,rx2-rx,ry2-ry);
    c2.font='11px sans-serif';c2.textAlign='center';
    c2.fillText(`⌀${(2*e.r).toFixed(2)}`,csx+Math.cos(ang)*e.r*zoom*1.5,csy-Math.sin(ang)*e.r*zoom*1.5);
  } else {
    c2.beginPath();c2.moveTo(csx,csy);c2.lineTo(rx,ry);c2.stroke();
    screenArrow(c2,rx,ry,rx-csx,ry-csy);
    c2.font='11px sans-serif';c2.textAlign='center';
    c2.fillText(`R${e.r.toFixed(2)}`,csx+Math.cos(ang)*e.r*zoom*1.5,csy-Math.sin(ang)*e.r*zoom*1.5);
  }
  c2.restore();
}

// ── Rubber-band preview ───────────────────────────────────────────────────────
function drawPreview(){
  if(!tempPt||clicks.length===0) return;
  ctx.save();
  ctx.strokeStyle='rgba(0,120,212,0.7)';
  ctx.fillStyle='rgba(0,120,212,0.7)';
  ctx.lineWidth=1;ctx.setLineDash([4,4]);
  const pt=w2s(tempPt[0],tempPt[1]);
  const c0=clicks.length>0?w2s(clicks[0][0],clicks[0][1]):null;
  const c1=clicks.length>1?w2s(clicks[1][0],clicks[1][1]):null;

  switch(currentTool){
    case 'line':
      if(c0){ctx.beginPath();ctx.moveTo(c0[0],c0[1]);ctx.lineTo(pt[0],pt[1]);ctx.stroke();} break;
    case 'circle':
      if(c0){const r=Math.hypot(pt[0]-c0[0],pt[1]-c0[1]);ctx.beginPath();ctx.arc(c0[0],c0[1],r,0,2*Math.PI);ctx.stroke();} break;
    case 'arc':
      if(c0&&!c1){const r=Math.hypot(pt[0]-c0[0],pt[1]-c0[1]);ctx.beginPath();ctx.arc(c0[0],c0[1],r,0,2*Math.PI);ctx.stroke();}
      else if(c0&&c1){const r=Math.hypot(c1[0]-c0[0],c1[1]-c0[1]);
        ctx.beginPath();ctx.arc(c0[0],c0[1],r,Math.atan2(c1[1]-c0[1],c1[0]-c0[0]),Math.atan2(pt[1]-c0[1],pt[0]-c0[0]));ctx.stroke();} break;
    case 'rect':
      if(c0){ctx.beginPath();ctx.rect(Math.min(c0[0],pt[0]),Math.min(c0[1],pt[1]),Math.abs(pt[0]-c0[0]),Math.abs(pt[1]-c0[1]));ctx.stroke();} break;
    case 'poly':{
      const all=[...clicks.map(p=>w2s(p[0],p[1])),pt];
      drawPolylineScrPts(ctx,all); break;
    }
    case 'spline':{
      const all=[...clicks.map(p=>w2s(p[0],p[1])),pt];
      if(all.length>=4) drawBezierSpline(ctx,all); else drawPolylineScrPts(ctx,all); break;
    }
    case 'nurbs':{
      const all=[...clicks.map(p=>w2s(p[0],p[1])),pt];
      if(all.length>=4){
        // Preview NURBS in screen space (world-space control pts → screen).
        const wPts=[...clicks,tempPt];
        const n=wPts.length, deg=Math.min(3,n-1);
        const knots=clampedUniformKnots(n,deg);
        const lo=knots[deg],hi=knots[n];
        const samples=Math.max(50,n*15);
        ctx.beginPath();
        for(let k=0;k<=samples;k++){
          let t=lo+(k/samples)*(hi-lo);
          if(t>=hi)t=hi-1e-10;
          const[wx,wy]=nurbsEval(deg,wPts,knots,null,t);
          const[sx,sy]=w2s(wx,wy);
          if(k===0) ctx.moveTo(sx,sy); else ctx.lineTo(sx,sy);
        }
        ctx.stroke();
      } else drawPolylineScrPts(ctx,all);
      break;
    }
    case 'ellipse':
      if(c0&&!c1){const r=Math.hypot(pt[0]-c0[0],pt[1]-c0[1]);ctx.beginPath();ctx.arc(c0[0],c0[1],r,0,2*Math.PI);ctx.stroke();}
      else if(c0&&c1){const a=Math.hypot(c1[0]-c0[0],c1[1]-c0[1]),b=Math.hypot(pt[0]-c0[0],pt[1]-c0[1]),rot=Math.atan2(c1[1]-c0[1],c1[0]-c0[0]);
        ctx.beginPath();ctx.ellipse(c0[0],c0[1],a,b,rot,0,2*Math.PI);ctx.stroke();} break;
    case 'dimlin':case 'dimali':
      if(c0){ctx.beginPath();ctx.moveTo(c0[0],c0[1]);ctx.lineTo(pt[0],pt[1]);ctx.stroke();} break;
    case 'dimang':
      if(c0){ctx.beginPath();ctx.moveTo(c0[0],c0[1]);ctx.lineTo(pt[0],pt[1]);ctx.stroke();} break;
    case 'dimrad':case 'dimdia':
      if(c0){const r=Math.hypot(pt[0]-c0[0],pt[1]-c0[1]);
        ctx.beginPath();ctx.arc(c0[0],c0[1],r,0,2*Math.PI);ctx.stroke();
        ctx.beginPath();ctx.moveTo(c0[0],c0[1]);ctx.lineTo(pt[0],pt[1]);ctx.stroke();} break;
  }
  // Click markers
  clicks.forEach(([wx,wy])=>{
    const[sx,sy]=w2s(wx,wy);
    ctx.setLineDash([]);ctx.beginPath();ctx.arc(sx,sy,3,0,2*Math.PI);ctx.fill();
  });
  ctx.restore();
}

// ─── Initialise ───────────────────────────────────────────────────────────────
(async()=>{
  resize();
  try {
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='wasm_exec.js';s.onload=res;s.onerror=rej;
      document.head.appendChild(s);
    });
    await loadWASM();
  } catch(err) {
    installDemoStubs();
    setStatus('Demo mode — serve wasm_exec.js + main.wasm alongside this file for full WASM mode');
  }
  loadSnapSettings();  // restore snap mode checkboxes + enabled state from localStorage (Task #5)
  refreshLayerSel();   // populate layer dropdown (Task #5)
  updateSnapBtn();     // set initial snap button state (Task #5)
  render();
  setTool('line');
})();
</script>
